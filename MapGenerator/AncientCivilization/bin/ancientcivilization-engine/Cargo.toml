[package]
name = "ancientcivilization-engine"
version = "0.1.0"
edition = "2021"

[dependencies]
# Serde for JSON serialization/deserialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Rand for deterministic RNG seeding (common in map gen)
rand = "0.8"
rand_chacha = "0.3"
